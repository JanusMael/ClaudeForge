name: Schema refresh

# Detect upstream drift of the bundled Claude Code JSON schema. Runs the
# hand-maintained `scripts/refresh-schema.ps1` against schemastore.org's
# current version and, if the working tree changes, opens a pull request
# for human review. Never commits to the default branch directly.
#
# Design rationale — see also `.github/WORKFLOWS.md`:
#   - Pure drift detection. The script is idempotent (hash short-circuit
#     when bytes match) so the no-drift path is a no-op and emits no PR.
#   - The sibling overlay (`claude-code-settings.overlay.json`) is never
#     touched by the script, so this workflow can never silently overwrite
#     hand-curated additions (model id list, model.examples, etc.).
#   - Human review of the schema diff is the whole point — auto-merge is
#     deliberately not configured. Reviewer reads the diff, runs the
#     overlay guard tests locally if anything looks load-bearing, then
#     approves.

on:
  schedule:
    # Mondays 09:00 UTC — same slot as Dependabot. The two open PRs in
    # the same window so weekly maintenance is one review pass.
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Don't cancel an in-flight scheduled run if a manual dispatch arrives.
# Drift detection is cheap and idempotent; finishing both runs is fine.
concurrency:
  group: schema-refresh
  cancel-in-progress: false

permissions:
  contents: write       # create branch + commit
  pull-requests: write  # open the PR

jobs:
  refresh:
    name: Refresh + PR on drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pwsh is preinstalled on the ubuntu-latest runner image; no setup
      # step needed. The script uses only Invoke-WebRequest + Get-Content
      # + ConvertFrom-Json + Get-FileHash — all built-in to PowerShell 7.

      - name: Run refresh-schema.ps1
        shell: pwsh
        run: |
          # The script is idempotent: hash short-circuit when upstream
          # matches the bundled copy. The hash check writes "Already up
          # to date" and exits 0, leaving the working tree unchanged.
          # The drift path overwrites src/ClaudeForge.Core/Assets/Schemas/
          # claude-code-settings.json and exits 0.
          pwsh scripts/refresh-schema.ps1

      - name: Detect drift
        id: drift
        shell: bash
        run: |
          # Limit the diff check to the schema file the script writes —
          # anything else in the tree changing would be a workflow bug.
          if git diff --quiet -- src/ClaudeForge.Core/Assets/Schemas/claude-code-settings.json; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected — bundled schema matches upstream."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected — bundled schema differs from upstream."
            echo "::group::Diff summary"
            git diff --stat -- src/ClaudeForge.Core/Assets/Schemas/claude-code-settings.json
            echo "::endgroup::"
          fi

      # Open the PR only when drift was detected. peter-evans/create-pull-request
      # handles the branch-already-exists case automatically: if a prior run
      # left an open chore/schema-refresh PR, this updates it in place rather
      # than opening a duplicate.
      - name: Open / update drift PR
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            chore(schema): refresh bundled claude-code-settings.json from schemastore.org

            Auto-generated by .github/workflows/schema-refresh.yml.
            Reviewer: inspect the schema diff. The hand-curated overlay at
            src/ClaudeForge.Core/Assets/Schemas/claude-code-settings.overlay.json
            is NOT touched by the refresh; it is merged onto this file at
            runtime via RFC 7396 JSON Merge Patch.
          branch: chore/schema-refresh
          delete-branch: true
          title: 'chore(schema): refresh bundled claude-code-settings.json'
          body: |
            ## What this PR does

            Refreshes `src/ClaudeForge.Core/Assets/Schemas/claude-code-settings.json` from
            [schemastore.org](https://json.schemastore.org/claude-code-settings.json) — the
            upstream bundled schema has changed since the last refresh.

            ## Reviewer checklist

            - [ ] Read the schema diff. Anything load-bearing (new shapes, removed properties,
                  type changes) should be cross-checked against the editor factory dispatch in
                  `src/ClaudeForge/ViewModels/Editors/PropertyEditorFactory.cs` /
                  `DefaultEditorFactory.cs`.
            - [ ] Confirm `SchemaRegistryOverlayTests` and `ModelPropertyPromotionTests` still
                  pass. The sibling overlay (`claude-code-settings.overlay.json`) was NOT
                  touched by this refresh — if a hand-curated key is now present upstream,
                  delete it from the overlay so upstream's value wins.
            - [ ] Spot-check the bundled schema produces a typed editor for any new property
                  (avoid the `JsonRaw` fallback for properties whose shape is well-known).

            ## How this is triggered

            Weekly schedule (Mondays 09:00 UTC) plus manual `workflow_dispatch`. The
            refresh script is idempotent — no drift means no PR.

            ## What this PR does NOT do

            It does not touch `claude-code-settings.overlay.json`, the editor factory,
            tests, or any other source. Schema-only.
          labels: |
            schema-refresh
            dependencies
          # The `dependencies` label is excluded from the release changelog
          # via .github/release.yml so refresh PRs don't pollute release notes.
